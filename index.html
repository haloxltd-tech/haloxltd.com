<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HALOX</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <style>
    :root { --halo-orange: #ff4a00; }

    html, body {
      height: 100%; margin: 0;
      background: #000; color: var(--halo-orange);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .wrap {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 56px;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .logo-wrap {
      position: relative;
      width: min(380px, 72vw);
      aspect-ratio: 1;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      opacity: 0;
      filter: brightness(0) saturate(0);
      animation: burnIn 3.5s ease-out 0.5s forwards;
    }

    .logo-wrap img.pulsing {
      opacity: 1 !important;
      filter: brightness(1) saturate(1) !important;
      animation: logoPulse 2.4s ease-in-out infinite !important;
    }

    .coil-svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .coil-svg.visible { opacity: 1; }

    a.contact {
      display: inline-block;
      letter-spacing: .25rem;
      text-decoration: none;
      color: var(--halo-orange);
      font-weight: 700;
      font-size: clamp(18px, 2.6vw, 24px);
      border-bottom: 2px solid transparent;
      opacity: 0;
      transform: translateY(12px);
    }

    a.contact.visible {
      animation: driftIn 1s ease-out forwards, contactPulse 4s ease-in-out 1s infinite;
    }

    a.contact:hover, a.contact:focus {
      border-bottom-color: var(--halo-orange);
      outline: none;
    }

    @keyframes burnIn {
      0%   { opacity: 0; filter: brightness(0) saturate(0); transform: scale(1.05); }
      30%  { opacity: 1; filter: brightness(2.2) saturate(4); transform: scale(1); }
      60%  { filter: brightness(1.4) saturate(2); }
      80%  { filter: brightness(1.1) saturate(1.4); }
      90%  { filter: brightness(1.4) saturate(1.8); }
      100% { opacity: 1; filter: brightness(1) saturate(1); transform: none; }
    }

    @keyframes logoPulse {
      0%, 100% { filter: brightness(1) saturate(1); }
      50%      { filter: brightness(1.3) saturate(1.5); }
    }

    @keyframes coilHeat {
      0%, 100% { opacity: 0.0; r: 34; }
      40%      { opacity: 0.28; r: 38; }
      60%      { opacity: 0.35; r: 40; }
      80%      { opacity: 0.22; r: 37; }
    }

    @keyframes ring1 {
      0%   { r: 46; opacity: 0.3; stroke-width: 2; }
      100% { r: 85; opacity: 0;   stroke-width: 0.3; }
    }

    @keyframes ring2 {
      0%   { r: 46; opacity: 0.2; stroke-width: 1.5; }
      100% { r: 105; opacity: 0;  stroke-width: 0.3; }
    }

    @keyframes ring3 {
      0%   { r: 46; opacity: 0.15; stroke-width: 1; }
      100% { r: 125; opacity: 0;   stroke-width: 0.2; }
    }

    @keyframes driftIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes contactPulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.65; }
    }

    .coil-heat { animation: coilHeat 2.4s ease-in-out infinite; }
    .ring1     { animation: ring1   2.4s ease-out infinite; }
    .ring2     { animation: ring2   2.4s ease-out 0.5s infinite; }
    .ring3     { animation: ring3   2.4s ease-out 1s  infinite; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <main class="wrap" role="main">

    <div class="logo-wrap">
      <img id="logo" src="logo-hero.png" alt="HALOX logo" />

      <svg class="coil-svg" id="coil-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
        <radialGradient id="coilGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#ff6820" stop-opacity="0.35"/>
            <stop offset="50%"  stop-color="#ff4a00" stop-opacity="0.15"/>
            <stop offset="100%" stop-color="#ff4a00" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <circle class="coil-heat" cx="100" cy="76" r="38" fill="url(#coilGlow)"/>
        <circle class="ring1" cx="100" cy="76" r="46" fill="none" stroke="#ff4a00"/>
        <circle class="ring2" cx="100" cy="76" r="46" fill="none" stroke="#ff4a00"/>
        <circle class="ring3" cx="100" cy="76" r="46" fill="none" stroke="#ff4a00"/>
      </svg>
    </div>

    <p style="margin:0">
      <a class="contact" id="contact" href="/cdn-cgi/l/email-protection#a5cccbc3cae5cdc4c9caddc9d1c18bc6cac8">CONTACT</a>
    </p>

  </main>

  <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
    const logo    = document.getElementById('logo');
    const coilSvg = document.getElementById('coil-svg');
    const contact = document.getElementById('contact');

    function activate() {
      logo.classList.add('pulsing');
      coilSvg.classList.add('visible');
      contact.classList.add('visible');
    }

    logo.addEventListener('animationend', (e) => {
      if (e.animationName === 'burnIn') activate();
    });

    setTimeout(activate, 4200);
  </script>
</body>
</html>
